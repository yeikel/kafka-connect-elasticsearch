name: CI

on:
  push:
    branches:
      - master
  pull_request:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  test:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        es-version:
          - "8.19.15"
          - "9.0.8"
          - "9.1.10"
          - "9.2.8"
          - "9.3.4"
          - "9.4.1"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests (ES ${{ matrix.es-version }})
        run: mvn clean verify
        env:
          ELASTICSEARCH_VERSION: ${{ matrix.es-version }}

  package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build standalone distribution
        run: mvn clean install -Pstandalone -DskipTests

      - name: Upload standalone artifacts
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: standalone-jar
          path: target/*-standalone.jar
          if-no-files-found: error
          retention-days: 90

      - name: Build distribution
        run: mvn clean install -DskipTests

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: distribution-package
          path: target/*-package
          if-no-files-found: error
          retention-days: 90

  publish-release:
    if: github.event_name == 'release'
    needs: package-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download standalone artifact
        uses: actions/download-artifact@v5
        with:
          name: standalone-jar
          path: release-assets/standalone

      - name: Download distribution artifact
        uses: actions/download-artifact@v5
        with:
          name: distribution-package
          path: release-assets/distribution

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets/upload
          standalone_jar="$(find release-assets/standalone -maxdepth 1 -type f -name '*-standalone.jar' -print -quit)"
          package_dir="$(find release-assets/distribution -maxdepth 1 -mindepth 1 -type d -name '*-package' -print -quit)"
          if [ -z "$standalone_jar" ]; then
            echo "Standalone release artifact not found" >&2
            exit 1
          fi
          if [ -z "$package_dir" ]; then
            echo "Distribution release artifact not found" >&2
            exit 1
          fi
          cp "$standalone_jar" release-assets/upload/
          tar -C "$(dirname "$package_dir")" -czf "release-assets/upload/$(basename "$package_dir").tar.gz" "$(basename "$package_dir")"

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.event.release.tag_name }}" release-assets/upload/* --clobber
